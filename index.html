<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>付箋 話し合いアプリ</title>
  <!-- Tailwind CSS (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // 動的に生成される色クラスを確実に含めるための safelist
    tailwind.config = {
      safelist: [
        'bg-yellow-200','border-yellow-300','text-yellow-900',
        'bg-pink-200','border-pink-300','text-pink-900',
        'bg-blue-200','border-blue-300','text-blue-900',
        'bg-green-200','border-green-300','text-green-900',
        'bg-purple-200','border-purple-300','text-purple-900',
        'bg-white','border-gray-300','text-gray-800'
      ]
    };
  </script>
  <!-- React 18 (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel Standalone (JSXのブラウザ変換) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    .board-pattern {
      background-image: radial-gradient(circle, rgba(0,0,0,0.08) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: sans-serif; color: #6b7280; font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="root"><div id="loading">読み込み中…</div></div>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect, useCallback } = React;

    // --- アイコン（lucide風 SVG） ---
    const makeIcon = (inner) => ({ size = 24, className = '', ...props }) =>
      React.createElement('svg', {
        xmlns: 'http://www.w3.org/2000/svg', width: size, height: size,
        viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor',
        strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round',
        className, ...props,
        dangerouslySetInnerHTML: { __html: inner }
      });

    const Upload = makeIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>');
    const Plus = makeIcon('<path d="M5 12h14"/><path d="M12 5v14"/>');
    const Trash2 = makeIcon('<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>');
    const Edit3 = makeIcon('<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>');
    const Type = makeIcon('<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/>');
    const Move = makeIcon('<polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" x2="22" y1="12" y2="12"/><line x1="12" x2="12" y1="2" y2="22"/>');
    const MessageSquare = makeIcon('<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>');
    const Maximize2 = makeIcon('<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" x2="14" y1="3" y2="10"/><line x1="3" x2="10" y1="21" y2="14"/>');
    const Minimize2 = makeIcon('<polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" x2="21" y1="10" y2="3"/><line x1="3" x2="10" y1="21" y2="14"/>');

    function App() {
      // ステート管理
      const [rawData, setRawData] = useState([]);
      const [columns, setColumns] = useState([]);
      const [notes, setNotes] = useState([]);
      const [pastedText, setPastedText] = useState('');

      // 付箋化の設定
      const [selectedTitleCol, setSelectedTitleCol] = useState('');
      const [selectedRowIndices, setSelectedRowIndices] = useState(new Set());

      // ドラッグ＆ドロップ用ステート
      const [draggingId, setDraggingId] = useState(null);
      const [offset, setOffset] = useState({ x: 0, y: 0 });
      const [highestZIndex, setHighestZIndex] = useState(1);

      // UI状態
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const boardRef = useRef(null);

      // タブ管理
      const [tabs, setTabs] = useState([{ id: 'tab-1', name: 'メインボード' }]);
      const [activeTabId, setActiveTabId] = useState('tab-1');
      const [editingTabId, setEditingTabId] = useState(null);

      // リサイズ用ステート
      const [resizingId, setResizingId] = useState(null);
      const [resizeStartSize, setResizeStartSize] = useState({ width: 0, height: 0 });
      const [resizeStartPos, setResizeStartPos] = useState({ x: 0, y: 0 });

      // カラーパレット
      const colors = [
        'bg-yellow-200 border-yellow-300 text-yellow-900',
        'bg-pink-200 border-pink-300 text-pink-900',
        'bg-blue-200 border-blue-300 text-blue-900',
        'bg-green-200 border-green-300 text-green-900',
        'bg-purple-200 border-purple-300 text-purple-900',
        'bg-white border-gray-300 text-gray-800'
      ];

      // Excel/スプレッドシートのコピペデータ（TSV）をパースする
      const handlePaste = (e) => {
        const text = e.target.value;
        setPastedText(text);
        if (!text.trim()) {
          setRawData([]);
          setColumns([]);
          setSelectedRowIndices(new Set());
          return;
        }

        try {
          const rows = text.trim().split('\n').map(row => row.split('\t'));
          if (rows.length > 0) {
            const headers = rows[0].map(h => h.trim());
            const data = rows.slice(1).map(row => {
              let obj = {};
              headers.forEach((h, i) => {
                obj[h] = row[i] ? row[i].trim() : '';
              });
              return obj;
            });

            setColumns(headers);
            setRawData(data);
            setSelectedRowIndices(new Set(data.map((_, i) => i)));
            if (headers.length > 0) setSelectedTitleCol(headers[0]);
          }
        } catch (error) {
          console.error("データのパースに失敗しました", error);
        }
      };

      // 選択したデータから付箋を生成
      const generateNotes = () => {
        if (!selectedTitleCol) return;

        const boardWidth = boardRef.current ? boardRef.current.clientWidth : 800;
        const boardHeight = boardRef.current ? boardRef.current.clientHeight : 600;

        const newNotes = rawData
          .filter((_, i) => selectedRowIndices.has(i))
          .map((row, i) => ({
            id: `note-${Date.now()}-${i}`,
            text: row[selectedTitleCol] || '空のデータ',
            x: Math.random() * (boardWidth - 250) + 20,
            y: Math.random() * (boardHeight - 200) + 20,
            width: 200,
            height: 120,
            zIndex: highestZIndex + i + 1,
            color: colors[0],
            isEditing: false,
            tabId: activeTabId
          }));

        setHighestZIndex(prev => prev + newNotes.length);
        setNotes([...notes, ...newNotes]);
        setSidebarOpen(false);
      };

      // 空の付箋を追加
      const addBlankNote = () => {
        const newZ = highestZIndex + 1;
        setHighestZIndex(newZ);
        const newNote = {
          id: `note-${Date.now()}`,
          text: '新しい付箋',
          x: 50,
          y: 50,
          width: 200,
          height: 120,
          zIndex: newZ,
          color: colors[0],
          isEditing: true,
          tabId: activeTabId
        };
        setNotes([...notes, newNote]);
      };

      // ドラッグ開始
      const handlePointerDown = (e, id) => {
        if (e.target.tagName.toLowerCase() === 'textarea' || e.target.tagName.toLowerCase() === 'input') {
          return;
        }
        if (e.target.closest('.resize-handle')) {
          return;
        }
        if (e.type === 'touchstart' && !e.target.closest('.scrollable-area')) {
          e.preventDefault();
        }

        const newZ = highestZIndex + 1;
        setHighestZIndex(newZ);
        setNotes(notes.map(n => n.id === id ? { ...n, zIndex: newZ } : n));
        setDraggingId(id);

        const note = notes.find(n => n.id === id);
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

        const boardRect = boardRef.current.getBoundingClientRect();

        setOffset({
          x: clientX - boardRect.left - note.x,
          y: clientY - boardRect.top - note.y
        });
      };

      // リサイズ開始
      const handleResizeDown = (e, id) => {
        e.stopPropagation();
        if (e.type === 'touchstart') e.preventDefault();

        const newZ = highestZIndex + 1;
        setHighestZIndex(newZ);
        setNotes(notes.map(n => n.id === id ? { ...n, zIndex: newZ } : n));
        setResizingId(id);

        const note = notes.find(n => n.id === id);
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

        setResizeStartPos({ x: clientX, y: clientY });
        setResizeStartSize({ width: note.width || 200, height: note.height || 120 });
      };

      // ドラッグ中
      const handlePointerMove = useCallback((e) => {
        if (!draggingId && !resizingId) return;

        if (e.type === 'touchmove') {
          e.preventDefault();
        }

        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

        if (resizingId) {
          const deltaX = clientX - resizeStartPos.x;
          const deltaY = clientY - resizeStartPos.y;
          setNotes(prevNotes => prevNotes.map(note =>
            note.id === resizingId ? {
              ...note,
              width: Math.max(120, resizeStartSize.width + deltaX),
              height: Math.max(80, resizeStartSize.height + deltaY)
            } : note
          ));
          return;
        }

        if (draggingId) {
          const targetEl = document.elementFromPoint(clientX, clientY);
          if (targetEl) {
            const tabEl = targetEl.closest('[data-tab-id]');
            if (tabEl) {
              const hoverTabId = tabEl.getAttribute('data-tab-id');
              if (hoverTabId && hoverTabId !== activeTabId) {
                setActiveTabId(hoverTabId);
                setNotes(prevNotes => prevNotes.map(n =>
                  n.id === draggingId ? { ...n, tabId: hoverTabId } : n
                ));
              }
            }
          }

          if (boardRef.current) {
            const boardRect = boardRef.current.getBoundingClientRect();
            setNotes(prevNotes => prevNotes.map(note => {
              if (note.id === draggingId) {
                return {
                  ...note,
                  x: clientX - boardRect.left - offset.x,
                  y: clientY - boardRect.top - offset.y
                };
              }
              return note;
            }));
          }
        }
      }, [draggingId, resizingId, offset, resizeStartSize, resizeStartPos, activeTabId]);

      // ドラッグ終了
      const handlePointerUp = () => {
        setDraggingId(null);
        setResizingId(null);
      };

      // カーソルスタイルの制御
      useEffect(() => {
        if (draggingId) {
          document.body.style.cursor = 'grabbing';
        } else if (resizingId) {
          document.body.style.cursor = 'se-resize';
        } else {
          document.body.style.cursor = '';
        }
        return () => {
          document.body.style.cursor = '';
        };
      }, [draggingId, resizingId]);

      // グローバルなマウス/タッチイベントの登録
      useEffect(() => {
        if (draggingId || resizingId) {
          window.addEventListener('mousemove', handlePointerMove);
          window.addEventListener('mouseup', handlePointerUp);
          window.addEventListener('touchmove', handlePointerMove, { passive: false });
          window.addEventListener('touchend', handlePointerUp);
        }
        return () => {
          window.removeEventListener('mousemove', handlePointerMove);
          window.removeEventListener('mouseup', handlePointerUp);
          window.removeEventListener('touchmove', handlePointerMove);
          window.removeEventListener('touchend', handlePointerUp);
        };
      }, [draggingId, resizingId, handlePointerMove]);

      // 付箋の更新
      const updateNote = (id, field, value) => {
        setNotes(notes.map(n => n.id === id ? { ...n, [field]: value } : n));
      };

      // 付箋の削除
      const deleteNote = (id) => {
        setNotes(notes.filter(n => n.id !== id));
      };

      // 行の選択トグル
      const toggleRowSelection = (index) => {
        const newSet = new Set(selectedRowIndices);
        if (newSet.has(index)) {
          newSet.delete(index);
        } else {
          newSet.add(index);
        }
        setSelectedRowIndices(newSet);
      };

      const toggleAllRows = () => {
        if (selectedRowIndices.size === rawData.length) {
          setSelectedRowIndices(new Set());
        } else {
          setSelectedRowIndices(new Set(rawData.map((_, i) => i)));
        }
      };

      return (
        <div className="flex h-screen w-full bg-gray-50 overflow-hidden font-sans text-gray-800">

          {/* サイドバー */}
          <div
            className={`bg-white shadow-xl flex flex-col transition-all duration-300 ease-in-out z-20 ${
              sidebarOpen ? 'w-80 border-r border-gray-200' : 'w-0 overflow-hidden'
            }`}
          >
            <div className="p-5 flex-1 overflow-y-auto scrollable-area w-80">
              <div className="flex items-center gap-2 mb-6">
                <Upload className="text-blue-600" size={24} />
                <h2 className="text-lg font-bold text-gray-800">データ取り込み</h2>
              </div>

              <div className="mb-6">
                <label className="block text-sm font-medium text-gray-700 mb-2">
                  1. Excel/スプレッドシートからコピーして貼り付け
                </label>
                <textarea
                  className="w-full h-32 p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm resize-none"
                  placeholder="見出し行を含めてデータをここにペーストしてください..."
                  value={pastedText}
                  onChange={handlePaste}
                />
                {rawData.length > 0 && (
                  <p className="text-xs text-green-600 mt-2 font-medium">
                    ✓ {rawData.length} 件のデータを読み込みました
                  </p>
                )}
              </div>

              {columns.length > 0 && (
                <div className="mb-6 space-y-4 border-t border-gray-100 pt-4">
                  <label className="block text-sm font-medium text-gray-700">
                    2. 付箋化する列の選択
                  </label>

                  <div>
                    <label className="block text-xs text-gray-500 mb-1">付箋化する列 (必須)</label>
                    <select
                      className="w-full p-2 border border-gray-300 rounded-md text-sm focus:ring-blue-500"
                      value={selectedTitleCol}
                      onChange={(e) => setSelectedTitleCol(e.target.value)}
                    >
                      <option value="">-- 選択してください --</option>
                      {columns.map(col => <option key={col} value={col}>{col}</option>)}
                    </select>
                  </div>

                  {selectedTitleCol && (
                    <div className="space-y-2 border-t border-gray-100 pt-4 mt-4">
                      <div className="flex justify-between items-center">
                        <label className="block text-sm font-medium text-gray-700">
                          2. 付箋化するデータの選択
                        </label>
                        <button
                          onClick={toggleAllRows}
                          className="text-xs text-blue-600 hover:text-blue-800"
                        >
                          {selectedRowIndices.size === rawData.length ? '全て解除' : '全て選択'}
                        </button>
                      </div>

                      <div className="max-h-48 overflow-y-auto border border-gray-300 rounded-md bg-gray-50 p-2 space-y-1">
                        {rawData.map((row, i) => (
                          <label key={i} className="flex items-start gap-2 p-1.5 hover:bg-gray-200 rounded cursor-pointer transition-colors">
                            <input
                              type="checkbox"
                              className="mt-0.5 rounded text-blue-600 focus:ring-blue-500"
                              checked={selectedRowIndices.has(i)}
                              onChange={() => toggleRowSelection(i)}
                            />
                            <div className="text-xs overflow-hidden flex-1">
                              <div className="font-medium truncate text-gray-800">{row[selectedTitleCol] || '(空のデータ)'}</div>
                            </div>
                          </label>
                        ))}
                      </div>
                      <div className="text-xs text-right text-gray-500">
                        {selectedRowIndices.size} / {rawData.length} 件選択中
                      </div>
                    </div>
                  )}

                  <button
                    onClick={generateNotes}
                    disabled={!selectedTitleCol || selectedRowIndices.size === 0}
                    className={`w-full py-2.5 rounded-md text-white font-medium flex items-center justify-center gap-2 transition-colors mt-4 ${
                      (!selectedTitleCol || selectedRowIndices.size === 0) ? 'bg-gray-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-sm'
                    }`}
                  >
                    <MessageSquare size={18} />
                    付箋を生成する
                  </button>
                </div>
              )}

              <div className="mt-8 border-t border-gray-100 pt-4">
                <p className="text-xs text-gray-500 mb-3">操作ヒント:</p>
                <ul className="text-xs text-gray-600 space-y-2 list-disc pl-4">
                  <li>付箋はドラッグ＆ドロップで移動できます。</li>
                  <li>ダブルクリックまたは鉛筆アイコンで内容を編集できます。</li>
                  <li>右下のカラーパレットで色を変更できます。</li>
                </ul>
              </div>
            </div>
          </div>

          {/* メインボード領域 */}
          <div className="flex-1 flex flex-col relative">
            {/* ヘッダー/ツールバー */}
            <div className="bg-white/90 backdrop-blur-sm border-b border-gray-200 shadow-sm z-10 w-full flex flex-col shrink-0">
              <div className="p-3 flex justify-between items-center">
                <div className="flex items-center gap-3">
                  <button
                    onClick={() => setSidebarOpen(!sidebarOpen)}
                    className="p-2 hover:bg-gray-100 rounded-md text-gray-600 transition-colors"
                    title={sidebarOpen ? "サイドバーを閉じる" : "サイドバーを開く"}
                  >
                    {sidebarOpen ? <Minimize2 size={20} /> : <Maximize2 size={20} />}
                  </button>
                  <h1 className="text-lg font-bold text-gray-800">ディスカッションボード</h1>
                </div>
                <div className="flex items-center gap-2">
                  <button
                    onClick={addBlankNote}
                    className="px-4 py-2 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-md flex items-center gap-2 text-sm font-medium transition-colors"
                  >
                    <Plus size={16} />
                    新しい付箋
                  </button>
                  <button
                    onClick={() => setShowClearConfirm(true)}
                    className="p-2 text-red-500 hover:bg-red-50 rounded-md transition-colors"
                    title="現在のタブの付箋をすべてクリア"
                  >
                    <Trash2 size={20} />
                  </button>
                </div>
              </div>

              {/* タブバー */}
              <div className="flex px-3 pb-0 gap-1 overflow-x-auto items-end mt-1">
                {tabs.map(tab => (
                  <div
                    key={tab.id}
                    data-tab-id={tab.id}
                    className={`group flex items-center px-4 py-2 rounded-t-lg text-sm font-medium cursor-pointer transition-colors whitespace-nowrap select-none border-t border-l border-r ${
                      activeTabId === tab.id
                        ? 'bg-gray-100 text-blue-700 border-gray-200'
                        : 'bg-white text-gray-500 border-transparent hover:bg-gray-50 hover:text-gray-700'
                    }`}
                    onClick={() => setActiveTabId(tab.id)}
                  >
                    {editingTabId === tab.id ? (
                      <input
                        type="text"
                        autoFocus
                        defaultValue={tab.name}
                        onBlur={(e) => {
                          setTabs(tabs.map(t => t.id === tab.id ? { ...t, name: e.target.value || '無題' } : t));
                          setEditingTabId(null);
                        }}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter') e.target.blur();
                        }}
                        className="px-1 py-0.5 text-sm border border-blue-300 rounded focus:outline-none focus:ring-1 focus:ring-blue-500 w-24 bg-white text-black"
                      />
                    ) : (
                      <span onDoubleClick={() => setEditingTabId(tab.id)}>
                        {tab.name}
                      </span>
                    )}
                  </div>
                ))}
                <button
                  onClick={() => {
                    const newTabId = `tab-${Date.now()}`;
                    setTabs([...tabs, { id: newTabId, name: `タブ ${tabs.length + 1}` }]);
                    setActiveTabId(newTabId);
                  }}
                  className="px-3 py-2 text-gray-400 hover:text-blue-600 transition-colors ml-1 mb-1"
                  title="新しいタブを追加"
                >
                  <Plus size={18} />
                </button>
              </div>
            </div>

            {/* キャンバスエリア */}
            <div
              ref={boardRef}
              className="flex-1 bg-gray-100 relative overflow-hidden board-pattern cursor-crosshair"
            >
              {/* クリア確認モーダル */}
              {showClearConfirm && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/50">
                  <div className="bg-white p-6 rounded-lg shadow-xl max-w-sm w-full mx-4">
                    <h3 className="text-lg font-bold text-gray-900 mb-2">付箋を削除</h3>
                    <p className="text-sm text-gray-500 mb-6">現在のタブにあるすべての付箋を削除しますか？この操作は取り消せません。</p>
                    <div className="flex justify-end gap-3">
                      <button
                        onClick={() => setShowClearConfirm(false)}
                        className="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md transition-colors"
                      >
                        キャンセル
                      </button>
                      <button
                        onClick={() => { setNotes(notes.filter(n => n.tabId !== activeTabId)); setShowClearConfirm(false); }}
                        className="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors"
                      >
                        削除する
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {notes.filter(n => n.tabId === activeTabId).map(note => (
                <div
                  key={note.id}
                  className={`absolute shadow-md rounded-lg border flex flex-col transition-shadow hover:shadow-lg ${note.color} ${draggingId === note.id ? 'opacity-90 shadow-xl scale-[1.02]' : ''}`}
                  style={{
                    left: `${note.x}px`,
                    top: `${note.y}px`,
                    width: note.width ? `${note.width}px` : '200px',
                    height: note.height ? `${note.height}px` : '120px',
                    zIndex: note.zIndex,
                    pointerEvents: draggingId === note.id ? 'none' : 'auto'
                  }}
                  onMouseDown={(e) => handlePointerDown(e, note.id)}
                  onTouchStart={(e) => handlePointerDown(e, note.id)}
                >
                  {/* 付箋ヘッダー */}
                  <div className="flex justify-end items-start p-1.5 opacity-0 hover:opacity-100 transition-opacity absolute top-0 right-0 w-full bg-gradient-to-b from-black/5 to-transparent rounded-t-lg">
                    <div className="flex gap-1">
                      <button
                        onClick={(e) => { e.stopPropagation(); updateNote(note.id, 'isEditing', !note.isEditing); }}
                        className="p-1 hover:bg-black/10 rounded text-black/50 hover:text-black transition-colors"
                      >
                        <Edit3 size={14} />
                      </button>
                      <button
                        onClick={(e) => { e.stopPropagation(); deleteNote(note.id); }}
                        className="p-1 hover:bg-red-500/20 rounded text-black/50 hover:text-red-700 transition-colors"
                      >
                        <Trash2 size={14} />
                      </button>
                    </div>
                  </div>

                  {/* 付箋ボディ */}
                  <div className="p-3 pt-6 flex-1 flex flex-col justify-center overflow-hidden">
                    {note.isEditing ? (
                      <textarea
                        value={note.text}
                        onChange={(e) => updateNote(note.id, 'text', e.target.value)}
                        className="w-full h-full bg-white/50 border border-black/20 rounded p-1 text-sm font-medium focus:outline-none focus:ring-1 focus:ring-black/30 resize-none"
                        placeholder="情報を入力..."
                        autoFocus
                      />
                    ) : (
                      <div
                        className="text-sm font-medium whitespace-pre-wrap break-words text-center flex-1 select-none overflow-y-auto w-full h-full flex items-center justify-center"
                        onDoubleClick={() => updateNote(note.id, 'isEditing', true)}
                      >
                        {note.text}
                      </div>
                    )}
                  </div>

                  {/* 付箋フッター（カラー選択） */}
                  <div className="p-2 flex gap-1 justify-center border-t border-black/5 opacity-0 hover:opacity-100 transition-opacity mt-auto shrink-0">
                    {colors.map((colorClass, idx) => (
                      <button
                        key={idx}
                        onClick={(e) => { e.stopPropagation(); updateNote(note.id, 'color', colorClass); }}
                        className={`w-4 h-4 rounded-full border border-black/20 ${colorClass.split(' ')[0]}`}
                        title="色を変更"
                      />
                    ))}
                  </div>

                  {/* 編集完了ボタン */}
                  {note.isEditing && (
                    <div className="absolute -bottom-10 left-0 w-full flex justify-center">
                      <button
                        onClick={(e) => { e.stopPropagation(); updateNote(note.id, 'isEditing', false); }}
                        className="bg-gray-800 text-white text-xs px-3 py-1.5 rounded-full shadow-lg hover:bg-gray-700"
                      >
                        編集を完了
                      </button>
                    </div>
                  )}

                  {/* リサイズハンドル */}
                  <div
                    className="resize-handle absolute bottom-0 right-0 w-4 h-4 cursor-se-resize flex items-end justify-end p-1 opacity-50 hover:opacity-100"
                    onMouseDown={(e) => handleResizeDown(e, note.id)}
                    onTouchStart={(e) => handleResizeDown(e, note.id)}
                  >
                    <svg width="8" height="8" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M10 0V10H0L10 0Z" fill="currentColor" className="text-black/50" />
                    </svg>
                  </div>
                </div>
              ))}

              {notes.filter(n => n.tabId === activeTabId).length === 0 && !sidebarOpen && (
                <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none">
                  <MessageSquare size={48} className="mb-4 opacity-50" />
                  <p className="text-lg">付箋がありません</p>
                  <p className="text-sm mt-2">サイドバーからデータを取り込むか、「新しい付箋」を追加してください</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
