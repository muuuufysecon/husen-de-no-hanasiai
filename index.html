<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>付箋 話し合いアプリ - HTMLプレビュー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media screen { .print-area { display: none; } }
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      body * { visibility: hidden !important; }
      .print-area, .print-area * { visibility: visible !important; }
      .print-area {
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        padding: 16px !important;
        background: white !important;
        color: #111827 !important;
        font-family: sans-serif !important;
      }
      .print-page-break { page-break-after: always; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useRef, useEffect, useCallback } = React;

    const Icon = ({ name, size = 18, className = '' }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return React.createElement('i', {
        'data-lucide': name,
        className,
        style: { width: size + 'px', height: size + 'px', display: 'inline-block' }
      });
    };

    function App() {
      const [rawData, setRawData] = useState([]);
      const [columns, setColumns] = useState([]);
      const [notes, setNotes] = useState([]);
      const notesRef = useRef([]);
      const [pastedText, setPastedText] = useState('');
      const [selectedTitleCol, setSelectedTitleCol] = useState('');
      const [selectedRowIndices, setSelectedRowIndices] = useState(new Set());
      const [draggingId, setDraggingId] = useState(null);
      const [offset, setOffset] = useState({ x: 0, y: 0 });
      const [highestZIndex, setHighestZIndex] = useState(1);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [showMoreMenu, setShowMoreMenu] = useState(false);
      const [focusMode, setFocusMode] = useState(false);
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const [overviewMode, setOverviewMode] = useState(false);
      const [splitViewMode, setSplitViewMode] = useState(false);
      const [splitLeftWidth, setSplitLeftWidth] = useState(50);
      const [splitMiddleWidth, setSplitMiddleWidth] = useState(25);
      const [splitTabIds, setSplitTabIds] = useState([]);
      const [showAllNotesPanel, setShowAllNotesPanel] = useState(false);
      const [selectedNoteIds, setSelectedNoteIds] = useState(new Set());
      const [noteSearchQuery, setNoteSearchQuery] = useState('');
      const [focusedNoteId, setFocusedNoteId] = useState(null);
      const [saveStatus, setSaveStatus] = useState('未保存');
      const boardRef = useRef(null);
      const skipInitialSaveRef = useRef(true);
      const editingCursorRef = useRef(null);
      const groupDragStartRef = useRef(null);
      const notePointerStartRef = useRef(null);
      const longPressTimerRef = useRef(null);
      const longPressSelectionRef = useRef(false);
      const [tabs, setTabs] = useState([{ id: 'tab-1', name: 'メインボード', updatedAt: Date.now() }]);
      const tabsRef = useRef([]);
      const [activeTabId, setActiveTabId] = useState('tab-1');
      const [editingTabId, setEditingTabId] = useState(null);
      const [selectedTabIds, setSelectedTabIds] = useState(new Set(['tab-1']));
      const [resizingId, setResizingId] = useState(null);
      const [resizeStartSize, setResizeStartSize] = useState({ width: 0, height: 0 });
      const [resizeStartPos, setResizeStartPos] = useState({ x: 0, y: 0 });
      const [draggedListNoteId, setDraggedListNoteId] = useState(null);
      const [allNotesPanelTabId, setAllNotesPanelTabId] = useState('all');
      const undoHistoryRef = useRef([]);
      const firebaseDbRef = useRef(null);
      const remoteUpdateRef = useRef(false);
      const clientIdRef = useRef(`client-${Date.now()}-${Math.random().toString(36).slice(2)}`);
      const [canUndo, setCanUndo] = useState(false);
      const [firebaseStatus, setFirebaseStatus] = useState('Firebase未設定');
      const [deletedNoteIds, setDeletedNoteIds] = useState({});
      const [deletedTabIds, setDeletedTabIds] = useState({});
      const deletedNoteIdsRef = useRef({});
      const deletedTabIdsRef = useRef({});
      const [showFirebaseSettings, setShowFirebaseSettings] = useState(false);
      const [firebaseConfigState, setFirebaseConfigState] = useState(() => {
        try {
          const savedConfig = localStorage.getItem('fusen_firebase_config_v1');
          return savedConfig ? JSON.parse(savedConfig) : null;
        } catch (error) {
          console.error('Firebase設定の読み込みに失敗しました', error);
          return null;
        }
      });
      const [boardList, setBoardList] = useState(() => {
        try {
          const savedBoards = localStorage.getItem('fusen_board_menu_list_v1');
          const parsedBoards = savedBoards ? JSON.parse(savedBoards) : null;
          if (Array.isArray(parsedBoards) && parsedBoards.length > 0) return parsedBoards;
        } catch (error) {
          console.error('ボード一覧の読み込みに失敗しました', error);
        }
        return [{ id: 'default-board', name: 'メインボード', updatedAt: Date.now(), noteCount: 0, tabCount: 1 }];
      });
      const [currentBoardId, setCurrentBoardId] = useState('default-board');
      const [boardName, setBoardName] = useState('メインボード');
      const [boardOpened, setBoardOpened] = useState(false);
      const [newBoardName, setNewBoardName] = useState('');
      const [newBoardId, setNewBoardId] = useState('');
      const [joinBoardId, setJoinBoardId] = useState('');
      const [showManualManage, setShowManualManage] = useState(false);
      const [manualImportText, setManualImportText] = useState('');

      const colors = [
        'bg-yellow-200 border-yellow-300 text-yellow-900',
        'bg-pink-200 border-pink-300 text-pink-900',
        'bg-blue-200 border-blue-300 text-blue-900',
        'bg-green-200 border-green-300 text-green-900',
        'bg-purple-200 border-purple-300 text-purple-900',
        'bg-white border-gray-300 text-gray-800'
      ];
      const colorHexMap = {
        'bg-yellow-200 border-yellow-300 text-yellow-900': '#fef08a',
        'bg-pink-200 border-pink-300 text-pink-900': '#fbcfe8',
        'bg-blue-200 border-blue-300 text-blue-900': '#bfdbfe',
        'bg-green-200 border-green-300 text-green-900': '#bbf7d0',
        'bg-purple-200 border-purple-300 text-purple-900': '#e9d5ff',
        'bg-white border-gray-300 text-gray-800': '#ffffff'
      };
      const getColorHex = (colorClass) => colorHexMap[colorClass] || '#fef08a';
      const getNoteBackgroundStyle = (note) => {
        const backgroundStyle = note.color2 ? {
          background: `linear-gradient(to bottom, ${getColorHex(note.color)} 0%, ${getColorHex(note.color)} calc(100% - 12px), ${getColorHex(note.color2)} calc(100% - 12px), ${getColorHex(note.color2)} 100%)`
        } : {};
        return {
          ...backgroundStyle,
          borderWidth: note.isHighlighted ? '4px' : '2px',
          borderStyle: 'solid',
          borderColor: note.isHighlighted ? '#f97316' : 'transparent',
          boxShadow: note.isHighlighted
            ? '0 0 0 4px rgba(249, 115, 22, 0.22), 0 10px 24px rgba(17, 24, 39, 0.18)'
            : '0 2px 8px rgba(17, 24, 39, 0.12)'
        };
      };
      const STORAGE_KEY = 'fusen_discussion_board_data_v1';
      const GRID_COLUMNS = 8;
      const INITIAL_GRID_ROWS = 5;
      const CELL_HEIGHT = 140;
      const BOARD_PADDING = 16;
      const NOTE_INSET = 0;
      const SIDE_PANEL_WIDTH = 384;
      const DEFAULT_FIREBASE_BOARD_ID = 'default-board';
      const BOARD_LIST_STORAGE_KEY = 'fusen_board_menu_list_v1';
      const FIREBASE_CONFIG_STORAGE_KEY = 'fusen_firebase_config_v1';
      const getBoardStorageKey = (boardId = currentBoardId) => boardId === DEFAULT_FIREBASE_BOARD_ID ? STORAGE_KEY : `${STORAGE_KEY}_${boardId}`;
      const firebaseConfig = firebaseConfigState || {};
      const isFirebaseConfigured = Boolean(firebaseConfig.apiKey && firebaseConfig.projectId && firebaseConfig.appId);

      const boardStyle = {
        backgroundColor: '#f3f4f6'
      };

      const getBoardMetrics = () => {
        const boardWidth = boardRef.current ? boardRef.current.clientWidth : 960;
        const sidePanelWidth = showAllNotesPanel ? SIDE_PANEL_WIDTH : 0;
        const cellWidth = Math.max(120, (boardWidth - sidePanelWidth - BOARD_PADDING * 2) / GRID_COLUMNS);
        return {
          cellWidth,
          cellHeight: CELL_HEIGHT,
          padding: BOARD_PADDING,
          inset: NOTE_INSET
        };
      };

      const getGridCellPosition = (index, metrics = getBoardMetrics()) => {
        const column = index % GRID_COLUMNS;
        const row = Math.floor(index / GRID_COLUMNS);
        return {
          x: metrics.padding + column * metrics.cellWidth + metrics.inset,
          y: metrics.padding + row * metrics.cellHeight + metrics.inset,
          width: Math.max(100, metrics.cellWidth - metrics.inset * 2),
          height: metrics.cellHeight - metrics.inset * 2,
          gridColumn: column,
          gridRow: row
        };
      };
      const moveNoteToTab = (noteId, targetTabId) => {
        if (!noteId || !targetTabId || !tabs.some(tab => tab.id === targetTabId)) return;
        pushUndoSnapshot();
        setNotes(prevNotes => {
          const targetNoteCount = prevNotes.filter(note => note.tabId === targetTabId && note.id !== noteId).length;
          const cell = getGridCellPosition(targetNoteCount);
          return prevNotes.map(note => note.id === noteId ? { ...note, ...cell, tabId: targetTabId, isEditing: false, updatedAt: Date.now() } : note);
        });
        setActiveTabId(targetTabId);
      };
      const handleNoteDragStart = (ev, noteId) => {
        setDraggedListNoteId(noteId);
        ev.dataTransfer.setData('text/plain', noteId);
        ev.dataTransfer.effectAllowed = 'move';
      };
      const allowNoteDrop = (ev) => {
        const hasNoteData = draggedListNoteId || Array.from(ev.dataTransfer.types || []).includes('text/plain');
        if (!hasNoteData) return;
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
      };
      const handleTabDrop = (ev, targetTabId) => {
        ev.preventDefault();
        ev.stopPropagation();
        const noteId = ev.dataTransfer.getData('text/plain') || draggedListNoteId;
        moveNoteToTab(noteId, targetTabId);
        setDraggedListNoteId(null);
      };
      const allowBoardDrop = (ev) => {
        if (ev.target.closest('[data-all-notes-panel="true"]')) return;
        allowNoteDrop(ev);
      };
      const handleBoardDrop = (ev) => {
        if (ev.target.closest('[data-all-notes-panel="true"]')) return;
        ev.preventDefault();
        ev.stopPropagation();
        const noteId = ev.dataTransfer.getData('text/plain') || draggedListNoteId;
        if (!noteId || !boardRef.current) return;
        const boardRect = boardRef.current.getBoundingClientRect();
        const metrics = getBoardMetrics();
        const dropX = ev.clientX - boardRect.left;
        const dropY = ev.clientY - boardRect.top;
        const column = Math.min(GRID_COLUMNS - 1, Math.max(0, Math.round((dropX - metrics.padding) / metrics.cellWidth)));
        const row = Math.max(0, Math.round((dropY - metrics.padding) / metrics.cellHeight));
        const cell = {
          x: metrics.padding + column * metrics.cellWidth + metrics.inset,
          y: metrics.padding + row * metrics.cellHeight + metrics.inset,
          width: Math.max(100, metrics.cellWidth - metrics.inset * 2),
          height: metrics.cellHeight - metrics.inset * 2,
          gridColumn: column,
          gridRow: row
        };
        pushUndoSnapshot();
        setNotes(prevNotes => prevNotes.map(note => note.id === noteId ? { ...note, ...cell, tabId: activeTabId, isEditing: false, updatedAt: Date.now() } : note));
        setDraggedListNoteId(null);
      };
      const handleSplitCellDrop = (ev, targetTabId, column, row) => {
        ev.preventDefault();
        ev.stopPropagation();
        const noteId = ev.dataTransfer.getData('text/plain') || draggedListNoteId;
        if (!noteId || !targetTabId) return;
        const cell = getGridCellPosition(row * GRID_COLUMNS + column);
        pushUndoSnapshot();
        setNotes(prevNotes => prevNotes.map(note => note.id === noteId ? { ...note, ...cell, tabId: targetTabId, isEditing: false, updatedAt: Date.now() } : note));
        setActiveTabId(targetTabId);
        setDraggedListNoteId(null);
      };
      const getPrintableTabs = () => tabs;

      const getSaveData = () => ({
        notes: notes.map(({ memo, isEditing, ...note }) => ({ ...note, updatedAt: note.updatedAt || 0 })),
        tabs: tabs.map(tab => ({ ...tab, updatedAt: tab.updatedAt || 0 })),
        deletedNoteIds,
        deletedTabIds,
        activeTabId,
        selectedTabIds: [...selectedTabIds],
        highestZIndex,
        pastedText,
        columns,
        rawData,
        selectedTitleCol,
        selectedRowIndices: [...selectedRowIndices],
        boardId: currentBoardId,
        boardName,
        updatedBy: clientIdRef.current,
        boardUpdatedAt: Date.now()
      });

      const parseFirebaseConfigText = (text) => {
        const trimmed = String(text || '').trim();
        if (!trimmed) throw new Error('設定ファイルが空です');
        try {
          return JSON.parse(trimmed);
        } catch (jsonError) {
          const objectText = trimmed
            .replace(/^export\s+default\s+/, '')
            .replace(/^(const|let|var)\s+firebaseConfig\s*=\s*/, '')
            .replace(/;$/, '');
          return Function(`"use strict"; return (${objectText});`)();
        }
      };

      const applyFirebaseConfig = (config) => {
        if (!config || !config.apiKey || !config.projectId || !config.appId) {
          window.alert('Firebase設定に apiKey / projectId / appId が含まれているか確認してください。');
          setFirebaseStatus('Firebase設定エラー');
          return;
        }
        localStorage.setItem(FIREBASE_CONFIG_STORAGE_KEY, JSON.stringify(config));
        setFirebaseConfigState(config);
        setFirebaseStatus('Firebase設定を読み込みました');
      };

      const handleFirebaseConfigFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const config = parseFirebaseConfigText(reader.result);
            applyFirebaseConfig(config);
            setShowFirebaseSettings(false);
          } catch (error) {
            console.error('Firebase設定ファイルの読み込みに失敗しました', error);
            window.alert('Firebase設定ファイルを読み込めませんでした。JSON形式、または const firebaseConfig = {...}; 形式のファイルを指定してください。');
            setFirebaseStatus('設定ファイル読込エラー');
          }
        };
        reader.readAsText(file);
      };

      const handleFirebaseConfigDrop = (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        handleFirebaseConfigFile(ev.dataTransfer.files && ev.dataTransfer.files[0]);
      };

      const clearFirebaseConfig = () => {
        localStorage.removeItem(FIREBASE_CONFIG_STORAGE_KEY);
        firebaseDbRef.current = null;
        setFirebaseConfigState(null);
        setFirebaseStatus('Firebase設定待ち');
      };

      const normalizeNote = (note) => ({ ...note, isEditing: false, isHighlighted: Boolean(note.isHighlighted), tags: Array.isArray(note.tags) ? note.tags : [], updatedAt: Number.isFinite(note.updatedAt) ? note.updatedAt : 0 });
      const normalizeTab = (tab) => ({ ...tab, updatedAt: Number.isFinite(tab.updatedAt) ? tab.updatedAt : 0 });
      const normalizeDeletedMap = (value) => value && typeof value === 'object' && !Array.isArray(value) ? value : {};
      const mergeDeletedMaps = (localMap, remoteMap) => {
        const merged = { ...normalizeDeletedMap(localMap) };
        Object.entries(normalizeDeletedMap(remoteMap)).forEach(([id, deletedAt]) => {
          if (!Number.isFinite(deletedAt)) return;
          merged[id] = Math.max(merged[id] || 0, deletedAt);
        });
        return merged;
      };
      const mergeItemsByUpdatedAt = (localItems, remoteItems, deletedMap, normalizer) => {
        const mergedMap = new Map();
        [...(Array.isArray(localItems) ? localItems : []), ...(Array.isArray(remoteItems) ? remoteItems : [])].forEach(item => {
          if (!item || !item.id) return;
          const normalized = normalizer(item);
          const deletedAt = normalizeDeletedMap(deletedMap)[normalized.id] || 0;
          if (deletedAt && deletedAt >= (normalized.updatedAt || 0)) return;
          const current = mergedMap.get(normalized.id);
          if (!current || (normalized.updatedAt || 0) >= (current.updatedAt || 0)) {
            mergedMap.set(normalized.id, normalized);
          }
        });
        return Array.from(mergedMap.values());
      };

      const saveBoardData = (statusPrefix = '保存済み') => {
        if (!boardOpened) return;
        try {
          const now = Date.now();
          const saveData = { ...getSaveData(), boardUpdatedAt: now };
          localStorage.setItem(getBoardStorageKey(), JSON.stringify(saveData));
          const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
          const boardMeta = {
            id: currentBoardId,
            name: boardName || '無題のボード',
            updatedAt: now,
            noteCount: notes.length,
            tabCount: tabs.length
          };
          setBoardList(prevBoards => {
            const nextBoards = [boardMeta, ...prevBoards.filter(board => board.id !== currentBoardId)]
              .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            localStorage.setItem(BOARD_LIST_STORAGE_KEY, JSON.stringify(nextBoards));
            return nextBoards;
          });
          setSaveStatus(`${statusPrefix} ${time}`);
          if (isFirebaseConfigured && firebaseDbRef.current && !remoteUpdateRef.current) {
            firebaseDbRef.current.collection('boards').doc(currentBoardId || DEFAULT_FIREBASE_BOARD_ID).set({
              ...saveData,
              updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).then(() => {
              setFirebaseStatus(`共有済み ${time}`);
            }).catch(error => {
              console.error('Firebaseへの保存に失敗しました', error);
              setFirebaseStatus('Firebase保存エラー');
            });
          }
        } catch (error) {
          console.error('保存に失敗しました', error);
          setSaveStatus('保存に失敗しました');
        }
      };

      const createUndoSnapshot = () => ({
        notes: notes.map(note => ({ ...note })),
        tabs: tabs.map(tab => ({ ...tab })),
        activeTabId,
        selectedTabIds: [...selectedTabIds],
        selectedNoteIds: [...selectedNoteIds],
        highestZIndex
      });

      const pushUndoSnapshot = () => {
        undoHistoryRef.current = [...undoHistoryRef.current.slice(-49), createUndoSnapshot()];
        setCanUndo(true);
      };

      const undoLastAction = () => {
        const snapshot = undoHistoryRef.current.pop();
        if (!snapshot) return;
        setNotes(snapshot.notes);
        setTabs(snapshot.tabs);
        setActiveTabId(snapshot.activeTabId);
        setSelectedTabIds(new Set(snapshot.selectedTabIds));
        setSelectedNoteIds(new Set(snapshot.selectedNoteIds));
        setHighestZIndex(snapshot.highestZIndex);
        setDraggingId(null);
        setResizingId(null);
        setDraggedListNoteId(null);
        setCanUndo(undoHistoryRef.current.length > 0);
        setSaveStatus('一つ戻しました');
      };

      const createEmptyBoardData = (name = '新しいボード') => ({
        notes: [],
        tabs: [{ id: 'tab-1', name: 'メインボード', updatedAt: Date.now() }],
        deletedNoteIds: {},
        deletedTabIds: {},
        activeTabId: 'tab-1',
        selectedTabIds: ['tab-1'],
        highestZIndex: 1,
        pastedText: '',
        columns: [],
        rawData: [],
        selectedTitleCol: '',
        selectedRowIndices: [],
        boardName: name,
        boardUpdatedAt: Date.now()
      });

      const applyLoadedBoardData = (saved = {}) => {
        const savedDeletedNoteIds = normalizeDeletedMap(saved.deletedNoteIds);
        const savedDeletedTabIds = normalizeDeletedMap(saved.deletedTabIds);
        const loadedTabs = Array.isArray(saved.tabs) && saved.tabs.length > 0
          ? saved.tabs.map(normalizeTab).filter(tab => !(savedDeletedTabIds[tab.id] && savedDeletedTabIds[tab.id] >= (tab.updatedAt || 0)))
          : [{ id: 'tab-1', name: 'メインボード', updatedAt: Date.now() }];
        setDeletedNoteIds(savedDeletedNoteIds);
        setDeletedTabIds(savedDeletedTabIds);
        setNotes(Array.isArray(saved.notes) ? saved.notes.map(({ memo, ...note }) => normalizeNote(note)).filter(note => !(savedDeletedNoteIds[note.id] && savedDeletedNoteIds[note.id] >= (note.updatedAt || 0))) : []);
        setTabs(loadedTabs.length > 0 ? loadedTabs : [{ id: 'tab-1', name: 'メインボード', updatedAt: Date.now() }]);
        setActiveTabId(saved.activeTabId || loadedTabs[0]?.id || 'tab-1');
        setSelectedTabIds(new Set(Array.isArray(saved.selectedTabIds) && saved.selectedTabIds.length > 0 ? saved.selectedTabIds : [loadedTabs[0]?.id || 'tab-1']));
        setHighestZIndex(Number.isFinite(saved.highestZIndex) ? saved.highestZIndex : 1);
        setPastedText(saved.pastedText || '');
        setColumns(Array.isArray(saved.columns) ? saved.columns : []);
        setRawData(Array.isArray(saved.rawData) ? saved.rawData : []);
        setSelectedTitleCol(saved.selectedTitleCol || '');
        setSelectedRowIndices(new Set(Array.isArray(saved.selectedRowIndices) ? saved.selectedRowIndices : []));
        setSelectedNoteIds(new Set());
        setDraggingId(null);
        setResizingId(null);
        setDraggedListNoteId(null);
        undoHistoryRef.current = [];
        setCanUndo(false);
      };

      const openBoardFromMenu = (boardId) => {
        const targetBoard = boardList.find(board => board.id === boardId) || { id: boardId, name: '無題のボード' };
        try {
          const savedText = localStorage.getItem(getBoardStorageKey(boardId));
          const saved = savedText ? JSON.parse(savedText) : createEmptyBoardData(targetBoard.name);
          setCurrentBoardId(boardId);
          setBoardName(saved.boardName || targetBoard.name || '無題のボード');
          applyLoadedBoardData(saved);
          setBoardOpened(true);
          skipInitialSaveRef.current = true;
          setSaveStatus('ボードを開きました');
        } catch (error) {
          console.error('ボードの読み込みに失敗しました', error);
          window.alert('ボードを読み込めませんでした。');
        }
      };

      const createBoardFromMenu = () => {
        const name = (newBoardName || '').trim() || `ボード ${boardList.length + 1}`;
        const customBoardId = String(newBoardId || '').trim();
        const boardId = customBoardId || `board-${Date.now()}-${Math.random().toString(36).slice(2)}`;
        if (!/^[A-Za-z0-9_-]{3,100}$/.test(boardId)) {
          window.alert('共有用ボードIDは半角英数字・ハイフン・アンダーバーのみ、3〜100文字で入力してください。');
          return;
        }
        const alreadyExists = boardList.some(board => board.id === boardId) || Boolean(localStorage.getItem(getBoardStorageKey(boardId)));
        if (alreadyExists) {
          window.alert('このボードIDはこの端末ですでに使われています。保存済みボードから開くか、別のIDを指定してください。');
          return;
        }
        const emptyBoard = createEmptyBoardData(name);
        const boardMeta = { id: boardId, name, updatedAt: Date.now(), noteCount: 0, tabCount: 1 };
        localStorage.setItem(getBoardStorageKey(boardId), JSON.stringify({ ...emptyBoard, boardId }));
        setBoardList(prevBoards => {
          const nextBoards = [boardMeta, ...prevBoards].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
          localStorage.setItem(BOARD_LIST_STORAGE_KEY, JSON.stringify(nextBoards));
          return nextBoards;

      const openBoardByIdFromMenu = () => {

      const changeBoardIdFromMenu = (oldBoardId) => {
        const targetBoard = boardList.find(board => board.id === oldBoardId) || { id: oldBoardId, name: '無題のボード' };
        const input = window.prompt('新しいボードIDを入力してください。半角英数字・ハイフン・アンダーバーが使えます。', oldBoardId);
        if (input === null) return;
        const newBoardId = String(input || '').trim();
        if (!newBoardId || newBoardId === oldBoardId) return;
        if (!/^[A-Za-z0-9_-]{3,100}$/.test(newBoardId)) {
          window.alert('ボードIDは半角英数字・ハイフン・アンダーバーのみ、3〜100文字で入力してください。');
          return;
        }
        const alreadyExists = boardList.some(board => board.id === newBoardId) || Boolean(localStorage.getItem(getBoardStorageKey(newBoardId)));
        if (alreadyExists) {
          window.alert('このボードIDはすでに使われています。別のIDを指定してください。');
          return;
        }
        const ok = window.confirm(`ボードIDを「${oldBoardId}」から「${newBoardId}」に変更します。共有相手には新しいIDを伝えてください。`);
        if (!ok) return;

        try {
          const oldKey = getBoardStorageKey(oldBoardId);
          const newKey = getBoardStorageKey(newBoardId);
          const savedText = localStorage.getItem(oldKey);
          const saved = savedText ? JSON.parse(savedText) : createEmptyBoardData(targetBoard.name || '無題のボード');
          const now = Date.now();
          const renamedData = {
            ...saved,
            boardId: newBoardId,
            boardName: saved.boardName || targetBoard.name || '無題のボード',
            boardUpdatedAt: now
          };
          localStorage.setItem(newKey, JSON.stringify(renamedData));
          localStorage.removeItem(oldKey);

          setBoardList(prevBoards => {
            const renamedMeta = {
              ...targetBoard,
              id: newBoardId,
              name: renamedData.boardName || targetBoard.name || '無題のボード',
              updatedAt: now,
              noteCount: Array.isArray(renamedData.notes) ? renamedData.notes.length : (targetBoard.noteCount || 0),
              tabCount: Array.isArray(renamedData.tabs) ? renamedData.tabs.length : (targetBoard.tabCount || 1)
            };
            const nextBoards = [renamedMeta, ...prevBoards.filter(board => board.id !== oldBoardId && board.id !== newBoardId)]
              .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            localStorage.setItem(BOARD_LIST_STORAGE_KEY, JSON.stringify(nextBoards));
            return nextBoards;
          });

          if (currentBoardId === oldBoardId) setCurrentBoardId(newBoardId);
          setSaveStatus('ボードIDを変更しました');

          if (isFirebaseConfigured && firebaseDbRef.current) {
            firebaseDbRef.current.collection('boards').doc(newBoardId).set({
              ...renamedData,
              updatedBy: clientIdRef.current,
              updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).then(() => {
              return firebaseDbRef.current.collection('boards').doc(oldBoardId).delete().catch(error => {
                console.warn('旧ボードIDのFirebaseデータ削除に失敗しました', error);
              });
            }).then(() => {
              setFirebaseStatus('ボードID変更を共有しました');
            }).catch(error => {
              console.error('Firebase上のボードID変更に失敗しました', error);
              setFirebaseStatus('Firebase ID変更エラー');
              window.alert('端末内のボードIDは変更しましたが、Firebase上の変更に失敗しました。Firestoreのルールや通信状態を確認してください。');
            });
          }
        } catch (error) {
          console.error('ボードIDの変更に失敗しました', error);
          window.alert('ボードIDを変更できませんでした。');
        }
      };

      const deleteBoardFromMenu = (boardId) => {
        const targetBoard = boardList.find(board => board.id === boardId);
        const ok = window.confirm(`「${targetBoard ? targetBoard.name : 'このボード'}」を削除します。よろしいですか？`);
        if (!ok) return;
        localStorage.removeItem(getBoardStorageKey(boardId));
        setBoardList(prevBoards => {
          const nextBoards = prevBoards.filter(board => board.id !== boardId);
          localStorage.setItem(BOARD_LIST_STORAGE_KEY, JSON.stringify(nextBoards));
          return nextBoards;
        });
        if (currentBoardId === boardId) setBoardOpened(false);
      };

      const exportCurrentBoardJson = () => {
        if (!currentBoardId) return;
        const now = Date.now();
        const exportData = { ...getSaveData(), boardUpdatedAt: now, exportedAt: now, exportType: 'fusen-board-data-v1' };
        const safeName = String(boardName || 'board').replace(/[\\/:*?"<>|]/g, '-').slice(0, 40);
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${safeName || 'board'}-${new Date(now).toISOString().slice(0, 10)}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        setSaveStatus('ボードを書き出しました');
      };

      const importBoardDataObject = (data, options = {}) => {
        if (!data || typeof data !== 'object') {
          window.alert('ボードデータを読み込めませんでした。');
          return;
        }
        const name = options.asNewBoard ? `${data.boardName || boardName || '読み込みボード'} コピー` : (data.boardName || boardName || '読み込みボード');
        if (options.asNewBoard) {
          const boardId = `board-${Date.now()}-${Math.random().toString(36).slice(2)}`;
          const importedData = { ...data, boardId, boardName: name, boardUpdatedAt: Date.now() };
          const boardMeta = {
            id: boardId,
            name,
            updatedAt: importedData.boardUpdatedAt,
            noteCount: Array.isArray(importedData.notes) ? importedData.notes.length : 0,
            tabCount: Array.isArray(importedData.tabs) ? importedData.tabs.length : 1
          };
          localStorage.setItem(getBoardStorageKey(boardId), JSON.stringify(importedData));
          setBoardList(prevBoards => {
            const nextBoards = [boardMeta, ...prevBoards].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            localStorage.setItem(BOARD_LIST_STORAGE_KEY, JSON.stringify(nextBoards));
            return nextBoards;
          });
          setCurrentBoardId(boardId);
          setBoardName(name);
          applyLoadedBoardData(importedData);
          setBoardOpened(true);
          skipInitialSaveRef.current = true;
        } else {
          pushUndoSnapshot();
          setBoardName(name);
          applyLoadedBoardData({ ...data, boardName: name });
        }
        setManualImportText('');
        setShowManualManage(false);
        setSaveStatus(options.asNewBoard ? '別ボードとして読み込みました' : 'ボードを読み込みました');
      };

      const importBoardJsonText = (text, options = {}) => {
        try {
          const data = JSON.parse(String(text || '').trim());
          importBoardDataObject(data, options);
        } catch (error) {
          console.error('ボードデータの読み込みに失敗しました', error);
          window.alert('JSON形式のボードデータを読み込めませんでした。');
        }
      };

      const handleBoardImportFile = (file, options = {}) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => importBoardJsonText(reader.result, options);
        reader.readAsText(file);
      };

      const copyCurrentBoardJson = async () => {
        if (!boardOpened) return;
        const text = JSON.stringify({ ...getSaveData(), exportedAt: Date.now(), exportType: 'fusen-board-data-v1' }, null, 2);
        try {
          await navigator.clipboard.writeText(text);
          setSaveStatus('ボードJSONをコピーしました');
        } catch (error) {
          console.error('クリップボードへのコピーに失敗しました', error);
          setManualImportText(text);
          window.alert('自動コピーできなかったため、テキスト欄にJSONを表示しました。');
        }
      };

      const copyCurrentBoardId = async () => {
        try {
          await navigator.clipboard.writeText(currentBoardId || DEFAULT_FIREBASE_BOARD_ID);
          setSaveStatus('ボードIDをコピーしました');
        } catch (error) {
          window.alert(`ボードID: ${currentBoardId || DEFAULT_FIREBASE_BOARD_ID}`);
        }
      };

      const manualPushToFirebase = () => {
        if (!isFirebaseConfigured || !firebaseDbRef.current) {
          window.alert('Firebase設定を読み込んでから実行してください。');
          return;
        }
        const now = Date.now();
        const saveData = { ...getSaveData(), boardUpdatedAt: now };
        firebaseDbRef.current.collection('boards').doc(currentBoardId || DEFAULT_FIREBASE_BOARD_ID).set({
          ...saveData,
          updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true }).then(() => {
          setFirebaseStatus('手動アップロード完了');
          setSaveStatus('Firebaseへ手動保存しました');
        }).catch(error => {
          console.error('Firebase手動アップロードに失敗しました', error);
          setFirebaseStatus('手動アップロード失敗');
          window.alert('Firebaseへの手動保存に失敗しました。Firestoreのルールや設定を確認してください。');
        });
      };

      const manualPullFromFirebase = () => {
        if (!isFirebaseConfigured || !firebaseDbRef.current) {
          window.alert('Firebase設定を読み込んでから実行してください。');
          return;
        }
        firebaseDbRef.current.collection('boards').doc(currentBoardId || DEFAULT_FIREBASE_BOARD_ID).get().then(snapshot => {
          if (!snapshot.exists) {
            window.alert('Firebase上にこのボードのデータがまだありません。');
            setFirebaseStatus('共有ボード未作成');
            return;
          }
          const shared = snapshot.data() || {};
          const ok = window.confirm('Firebase上のデータを読み込みます。現在の画面の内容とマージしますか？');
          if (!ok) return;
          remoteUpdateRef.current = true;
          const mergedDeletedNoteIds = mergeDeletedMaps(deletedNoteIdsRef.current, shared.deletedNoteIds);
          const mergedDeletedTabIds = mergeDeletedMaps(deletedTabIdsRef.current, shared.deletedTabIds);
          const mergedNotes = mergeItemsByUpdatedAt(notesRef.current, shared.notes, mergedDeletedNoteIds, normalizeNote);
          const mergedTabs = mergeItemsByUpdatedAt(tabsRef.current, shared.tabs, mergedDeletedTabIds, normalizeTab);
          const localEditingNotes = new Map(notesRef.current.filter(note => note.isEditing).map(note => [note.id, note]));
          const displayMergedNotes = mergedNotes.map(note => localEditingNotes.has(note.id) ? { ...note, ...localEditingNotes.get(note.id), isEditing: true } : { ...note, isEditing: false });
          setDeletedNoteIds(mergedDeletedNoteIds);
          setDeletedTabIds(mergedDeletedTabIds);
          setNotes(displayMergedNotes);
          setTabs(mergedTabs.length > 0 ? mergedTabs : [{ id: 'tab-1', name: 'メインボード', updatedAt: Date.now() }]);
          setBoardName(shared.boardName || boardName);
          setSaveStatus('Firebaseから手動取得しました');
          setFirebaseStatus('手動取得完了');
        }).catch(error => {
          console.error('Firebase手動取得に失敗しました', error);
          setFirebaseStatus('手動取得失敗');
          window.alert('Firebaseからの手動取得に失敗しました。Firestoreのルールや設定を確認してください。');
        });
      };

      useEffect(() => {
        try {
          const savedText = localStorage.getItem(getBoardStorageKey(DEFAULT_FIREBASE_BOARD_ID));
          if (!savedText) {
            setSaveStatus('ボードを選択してください');
            return;
          }
          const saved = JSON.parse(savedText);
          if (boardList.length === 1 && boardList[0]?.id === DEFAULT_FIREBASE_BOARD_ID) {
            setBoardList(prevBoards => {
              const nextBoards = prevBoards.map(board => board.id === DEFAULT_FIREBASE_BOARD_ID ? {
                ...board,
                name: saved.boardName || board.name,
                updatedAt: saved.boardUpdatedAt || board.updatedAt || Date.now(),
                noteCount: Array.isArray(saved.notes) ? saved.notes.length : 0,
                tabCount: Array.isArray(saved.tabs) ? saved.tabs.length : 1
              } : board);
              localStorage.setItem(BOARD_LIST_STORAGE_KEY, JSON.stringify(nextBoards));
              return nextBoards;
            });
          }
          applyLoadedBoardData(saved);
          setBoardName(saved.boardName || 'メインボード');
          setSaveStatus('保存データを確認しました');
        } catch (error) {
          console.error('保存データの読み込みに失敗しました', error);
          setSaveStatus('保存データの読み込みに失敗しました');
        }
      }, []);

      useEffect(() => { notesRef.current = notes; }, [notes]);
      useEffect(() => { tabsRef.current = tabs; }, [tabs]);
      useEffect(() => { deletedNoteIdsRef.current = deletedNoteIds; }, [deletedNoteIds]);
      useEffect(() => { deletedTabIdsRef.current = deletedTabIds; }, [deletedTabIds]);

      useEffect(() => {
        if (!boardOpened) return;
        if (skipInitialSaveRef.current) {
          skipInitialSaveRef.current = false;
          return;
        }
        if (remoteUpdateRef.current) {
          remoteUpdateRef.current = false;
          return;
        }
        if (notes.some(note => note.isEditing)) {
          return;
        }

        const timer = setTimeout(() => {
          saveBoardData('自動保存済み');
        }, 600);

        return () => clearTimeout(timer);
      }, [notes, tabs, deletedNoteIds, deletedTabIds, activeTabId, selectedTabIds, highestZIndex, pastedText, columns, rawData, selectedTitleCol, selectedRowIndices, boardOpened, currentBoardId, boardName]);

      useEffect(() => {
        if (!currentBoardId) {
          firebaseDbRef.current = null;
          setFirebaseStatus('ボード未選択');
          return;
        }
        if (!isFirebaseConfigured) {
          firebaseDbRef.current = null;
          setFirebaseStatus('Firebase設定待ち');
          return;
        }
        if (!window.firebase || !window.firebase.firestore) {
          setFirebaseStatus('Firebase SDK読込エラー');
          return;
        }

        try {
          if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
          const db = window.firebase.firestore();
          firebaseDbRef.current = db;
          const boardDoc = db.collection('boards').doc(currentBoardId || DEFAULT_FIREBASE_BOARD_ID);
          setFirebaseStatus('Firebase接続中');

          const unsubscribe = boardDoc.onSnapshot(snapshot => {
            if (!snapshot.exists) {
              setFirebaseStatus('共有ボード作成待ち');
              return;
            }

            const shared = snapshot.data() || {};
            if (shared.updatedBy === clientIdRef.current) return;

            remoteUpdateRef.current = true;
            const mergedDeletedNoteIds = mergeDeletedMaps(deletedNoteIdsRef.current, shared.deletedNoteIds);
            const mergedDeletedTabIds = mergeDeletedMaps(deletedTabIdsRef.current, shared.deletedTabIds);
            const mergedNotes = mergeItemsByUpdatedAt(notesRef.current, shared.notes, mergedDeletedNoteIds, normalizeNote);
            const mergedTabs = mergeItemsByUpdatedAt(tabsRef.current, shared.tabs, mergedDeletedTabIds, normalizeTab);
            const localEditingNotes = new Map(notesRef.current.filter(note => note.isEditing).map(note => [note.id, note]));
            const displayMergedNotes = mergedNotes.map(note => localEditingNotes.has(note.id) ? { ...note, ...localEditingNotes.get(note.id), isEditing: true } : { ...note, isEditing: false });
            setDeletedNoteIds(mergedDeletedNoteIds);
            setDeletedTabIds(mergedDeletedTabIds);
            setNotes(displayMergedNotes);
            setTabs(mergedTabs.length > 0 ? mergedTabs : [{ id: 'tab-1', name: 'メインボード', updatedAt: Date.now() }]);
            setActiveTabId(prev => (mergedTabs.some(tab => tab.id === prev) ? prev : (mergedTabs[0]?.id || 'tab-1')));
            setSelectedTabIds(prev => {
              const availableIds = new Set((mergedTabs.length > 0 ? mergedTabs : [{ id: 'tab-1' }]).map(tab => tab.id));
              const filtered = new Set([...prev].filter(id => availableIds.has(id)));
              if (filtered.size === 0 && mergedTabs[0]) filtered.add(mergedTabs[0].id);
              return filtered;
            });
            setHighestZIndex(prev => Math.max(Number.isFinite(shared.highestZIndex) ? shared.highestZIndex : 1, prev));
            setPastedText(prev => shared.pastedText || prev);
            setColumns(prev => Array.isArray(shared.columns) && shared.columns.length > 0 ? shared.columns : prev);
            setRawData(prev => Array.isArray(shared.rawData) && shared.rawData.length > 0 ? shared.rawData : prev);
            setSelectedTitleCol(prev => shared.selectedTitleCol || prev);
            setSelectedRowIndices(prev => Array.isArray(shared.selectedRowIndices) && shared.selectedRowIndices.length > 0 ? new Set(shared.selectedRowIndices) : prev);
            setSaveStatus('共有データをマージしました');
            setFirebaseStatus('共同編集中・付箋単位で同期');
          }, error => {
            console.error('Firebaseの同期に失敗しました', error);
            setFirebaseStatus('Firebase同期エラー');
          });

          return () => unsubscribe();
        } catch (error) {
          console.error('Firebaseの初期化に失敗しました', error);
          setFirebaseStatus('Firebase初期化エラー');
        }
      }, [firebaseConfigState, boardOpened, currentBoardId]);

      const handlePaste = (e) => {
        const text = e.target.value;
        setPastedText(text);
        if (!text.trim()) {
          setRawData([]); setColumns([]); setSelectedRowIndices(new Set()); return;
        }
        const rows = text.trim().split('\n').map(row => row.split('\t'));
        if (rows.length > 0) {
          const headers = rows[0].map(h => h.trim());
          const data = rows.slice(1).map(row => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = row[i] ? row[i].trim() : ''; });
            return obj;
          });
          setColumns(headers);
          setRawData(data);
          setSelectedRowIndices(new Set(data.map((_, i) => i)));
          if (headers.length > 0) setSelectedTitleCol(headers[0]);
        }
      };

      const generateNotes = () => {
        if (!selectedTitleCol) return;
        pushUndoSnapshot();
        const metrics = getBoardMetrics();
        const activeNoteCount = notes.filter(note => note.tabId === activeTabId).length;
        const targetRows = rawData.filter((_, i) => selectedRowIndices.has(i));
        const newNotes = targetRows.map((row, i) => {
          const cell = getGridCellPosition(activeNoteCount + i, metrics);
          return {
            id: `note-${Date.now()}-${i}-${Math.random().toString(36).slice(2)}`,
            text: row[selectedTitleCol] || '空のデータ',
            ...cell,
            zIndex: highestZIndex + i + 1,
            color: colors[0], color2: null, tags: [], isEditing: false, tabId: activeTabId, updatedAt: Date.now()
          };
        });
        setHighestZIndex(prev => prev + newNotes.length);
        setNotes(prev => [...prev, ...newNotes]);
        setSidebarOpen(false);
      };

      const addBlankNote = () => {
        pushUndoSnapshot();
        const newZ = highestZIndex + 1;
        const activeNoteCount = notes.filter(note => note.tabId === activeTabId).length;
        const cell = getGridCellPosition(activeNoteCount);
        setHighestZIndex(newZ);
        setNotes(prev => [...prev, {
          id: `note-${Date.now()}-${Math.random().toString(36).slice(2)}`,
          text: '新しい付箋',
          ...cell,
          zIndex: newZ, color: colors[0], color2: null, tags: [], isEditing: true, tabId: activeTabId, updatedAt: Date.now()
        }]);
      };

      const addNoteAtBoardPosition = (ev) => {
        if (!boardRef.current || overviewMode || splitViewMode || notes.some(note => note.isEditing)) return;
        if (ev.target.closest('[data-all-notes-panel="true"]') || ev.target.closest('[data-note-edit-modal="true"]') || ev.target.closest('[data-board-note="true"]') || ev.target.closest('button') || ev.target.closest('textarea') || ev.target.closest('input')) return;
        const boardRect = boardRef.current.getBoundingClientRect();
        const metrics = getBoardMetrics();
        const clickX = ev.clientX - boardRect.left;
        const clickY = ev.clientY - boardRect.top;
        const availableWidth = boardRef.current.clientWidth - (showAllNotesPanel ? SIDE_PANEL_WIDTH : 0);
        if (clickX < metrics.padding || clickY < metrics.padding || clickX > availableWidth) return;
        const column = Math.min(GRID_COLUMNS - 1, Math.max(0, Math.floor((clickX - metrics.padding) / metrics.cellWidth)));
        const row = Math.max(0, Math.floor((clickY - metrics.padding) / metrics.cellHeight));
        const cell = {
          x: metrics.padding + column * metrics.cellWidth + metrics.inset,
          y: metrics.padding + row * metrics.cellHeight + metrics.inset,
          width: Math.max(100, metrics.cellWidth - metrics.inset * 2),
          height: metrics.cellHeight - metrics.inset * 2,
          gridColumn: column,
          gridRow: row
        };
        pushUndoSnapshot();
        const newZ = highestZIndex + 1;
        setHighestZIndex(newZ);
        setNotes(prev => [...prev, {
          id: `note-${Date.now()}-${Math.random().toString(36).slice(2)}`,
          text: '新しい付箋',
          ...cell,
          zIndex: newZ, color: colors[0], color2: null, tags: [], isEditing: true, tabId: activeTabId, updatedAt: Date.now()
        }]);
      };

      const handlePointerDown = (e, id) => {
        if (e.detail >= 2) {
          e.preventDefault();
          e.stopPropagation();
          startEditingNote(id, 'text', e);
          return;
        }

        const tagName = e.target.tagName.toLowerCase();
        if (tagName === 'textarea' || tagName === 'input' || tagName === 'button' || e.target.closest('button') || e.target.closest('.resize-handle')) return;
        if (e.type === 'touchstart' && !e.target.closest('.scrollable-area')) e.preventDefault();
        const note = notes.find(n => n.id === id);
        if (!note || !boardRef.current) return;
        pushUndoSnapshot();

        const dragGroupIds = selectedNoteIds.has(id) && selectedNoteIds.size > 1
          ? [...selectedNoteIds].filter(noteId => notes.some(n => n.id === noteId && n.tabId === note.tabId))
          : [id];
        groupDragStartRef.current = {
          draggedId: id,
          noteIds: dragGroupIds,
          positions: notes.filter(n => dragGroupIds.includes(n.id)).reduce((map, n) => {
            map[n.id] = { x: n.x || 0, y: n.y || 0, tabId: n.tabId };
            return map;
          }, {})

                    e('button', { 'data-no-drag': 'true', type: 'button', onClick: ev => { ev.stopPropagation(); commitNoteEdit(editingNote.id); }, className: 'px-5 py-2 rounded-md bg-blue-600 text-white text-sm font-bold hover:bg-blue-700' }, '保存して閉じる')
                  )
                )
              ),
              activeNotes.length === 0 && !sidebarOpen && e('div', { className: 'absolute inset-0 flex flex-col items-center justify-center text-gray-400 pointer-events-none' }, e(Icon, { name: 'message-square', size: 48, className: 'mb-4 opacity-50' }), e('p', { className: 'text-lg' }, '付箋がありません'), e('p', { className: 'text-sm mt-2' }, 'サイドバーからデータを取り込むか、「新しい付箋」を追加してください'))
            )
          )
        ),
        e('div', { className: 'print-area' },
          e('h1', { style: { fontSize: '24px', fontWeight: 'bold', marginBottom: '8px' } }, 'ディスカッションボード'),
          e('p', { style: { marginBottom: '16px', color: '#4b5563' } }, '選択したタブの付箋一覧'),
          getPrintableTabs().map((tab, tabIndex) => { const tabNotes = notes.filter(note => note.tabId === tab.id); return e('section', { key: tab.id, className: tabIndex < getPrintableTabs().length - 1 ? 'print-page-break' : '', style: { marginBottom: '20px' } }, e('h2', { style: { fontSize: '18px', fontWeight: 'bold', borderBottom: '1px solid #d1d5db', paddingBottom: '6px', marginBottom: '10px' } }, tab.name), tabNotes.length === 0 ? e('p', { style: { color: '#6b7280' } }, '付箋がありません。') : e('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '8px' } }, tabNotes.map(note => e('div', { key: note.id, style: { border: '1px solid #d1d5db', borderRadius: '8px', padding: '10px', minHeight: '60px', whiteSpace: 'pre-wrap', breakInside: 'avoid', background: '#fef3c7' } },
            Array.isArray(note.tags) && note.tags.length > 0 && e('div', { style: { fontSize: '11px', color: '#4b5563', marginBottom: '6px' } }, note.tags.map(tag => `#${tag}`).join(' ')),
            e('div', null, note.text || '（空）')
          )))); })
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
