<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>付箋 話し合いアプリ - HTMLプレビュー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media screen { .print-area { display: none; } }
    @media print {
      @page { size: A4 landscape; margin: 10mm; }
      body * { visibility: hidden !important; }
      .print-area, .print-area * { visibility: visible !important; }
      .print-area {
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        padding: 16px !important;
        background: white !important;
        color: #111827 !important;
        font-family: sans-serif !important;
      }
      .print-page-break { page-break-after: always; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useRef, useEffect, useCallback } = React;

    const Icon = ({ name, size = 18, className = '' }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); });
      return React.createElement('i', {
        'data-lucide': name,
        className,
        style: { width: size + 'px', height: size + 'px', display: 'inline-block' }
      });
    };

    function App() {
      const [rawData, setRawData] = useState([]);
      const [columns, setColumns] = useState([]);
      const [notes, setNotes] = useState([]);
      const [pastedText, setPastedText] = useState('');
      const [selectedTitleCol, setSelectedTitleCol] = useState('');
      const [selectedRowIndices, setSelectedRowIndices] = useState(new Set());
      const [draggingId, setDraggingId] = useState(null);
      const [offset, setOffset] = useState({ x: 0, y: 0 });
      const [highestZIndex, setHighestZIndex] = useState(1);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const [overviewMode, setOverviewMode] = useState(false);
      const [showAllNotesPanel, setShowAllNotesPanel] = useState(false);
      const [selectedNoteIds, setSelectedNoteIds] = useState(new Set());
      const [saveStatus, setSaveStatus] = useState('未保存');
      const boardRef = useRef(null);
      const skipInitialSaveRef = useRef(true);
      const editingCursorRef = useRef(null);
      const [tabs, setTabs] = useState([{ id: 'tab-1', name: 'メインボード' }]);
      const [activeTabId, setActiveTabId] = useState('tab-1');
      const [editingTabId, setEditingTabId] = useState(null);
      const [selectedTabIds, setSelectedTabIds] = useState(new Set(['tab-1']));
      const [resizingId, setResizingId] = useState(null);
      const [resizeStartSize, setResizeStartSize] = useState({ width: 0, height: 0 });
      const [resizeStartPos, setResizeStartPos] = useState({ x: 0, y: 0 });
      const [draggedListNoteId, setDraggedListNoteId] = useState(null);
      const [allNotesPanelTabId, setAllNotesPanelTabId] = useState('all');
      const undoHistoryRef = useRef([]);
      const firebaseDbRef = useRef(null);
      const remoteUpdateRef = useRef(false);
      const clientIdRef = useRef(`client-${Date.now()}-${Math.random().toString(36).slice(2)}`);
      const [canUndo, setCanUndo] = useState(false);
      const [firebaseStatus, setFirebaseStatus] = useState('Firebase未設定');
      const [showFirebaseSettings, setShowFirebaseSettings] = useState(false);
      const [firebaseConfigState, setFirebaseConfigState] = useState(() => {
        try {
          const savedConfig = localStorage.getItem('fusen_firebase_config_v1');
          return savedConfig ? JSON.parse(savedConfig) : null;
        } catch (error) {
          console.error('Firebase設定の読み込みに失敗しました', error);
          return null;
        }
      });

      const colors = [
        'bg-yellow-200 border-yellow-300 text-yellow-900',
        'bg-pink-200 border-pink-300 text-pink-900',
        'bg-blue-200 border-blue-300 text-blue-900',
        'bg-green-200 border-green-300 text-green-900',
        'bg-purple-200 border-purple-300 text-purple-900',
        'bg-white border-gray-300 text-gray-800'
      ];
      const colorHexMap = {
        'bg-yellow-200 border-yellow-300 text-yellow-900': '#fef08a',
        'bg-pink-200 border-pink-300 text-pink-900': '#fbcfe8',
        'bg-blue-200 border-blue-300 text-blue-900': '#bfdbfe',
        'bg-green-200 border-green-300 text-green-900': '#bbf7d0',
        'bg-purple-200 border-purple-300 text-purple-900': '#e9d5ff',
        'bg-white border-gray-300 text-gray-800': '#ffffff'
      };
      const getColorHex = (colorClass) => colorHexMap[colorClass] || '#fef08a';
      const getNoteBackgroundStyle = (note) => note.color2 ? {
        background: `linear-gradient(to bottom, ${getColorHex(note.color)} 0%, ${getColorHex(note.color)} calc(100% - 12px), ${getColorHex(note.color2)} calc(100% - 12px), ${getColorHex(note.color2)} 100%)`
      } : {};
      const STORAGE_KEY = 'fusen_discussion_board_data_v1';
      const GRID_COLUMNS = 8;
      const INITIAL_GRID_ROWS = 5;
      const CELL_HEIGHT = 140;
      const BOARD_PADDING = 16;
      const NOTE_INSET = 0;
      const SIDE_PANEL_WIDTH = 384;
      const FIREBASE_BOARD_ID = 'default-board';
      const FIREBASE_CONFIG_STORAGE_KEY = 'fusen_firebase_config_v1';
      const firebaseConfig = firebaseConfigState || {};
      const isFirebaseConfigured = Boolean(firebaseConfig.apiKey && firebaseConfig.projectId && firebaseConfig.appId);

      const boardStyle = {
        backgroundColor: '#f3f4f6'
      };

      const getBoardMetrics = () => {
        const boardWidth = boardRef.current ? boardRef.current.clientWidth : 960;
        const sidePanelWidth = showAllNotesPanel ? SIDE_PANEL_WIDTH : 0;
        const cellWidth = Math.max(120, (boardWidth - sidePanelWidth - BOARD_PADDING * 2) / GRID_COLUMNS);
        return {
          cellWidth,
          cellHeight: CELL_HEIGHT,
          padding: BOARD_PADDING,
          inset: NOTE_INSET
        };
      };

      const getGridCellPosition = (index, metrics = getBoardMetrics()) => {
        const column = index % GRID_COLUMNS;
        const row = Math.floor(index / GRID_COLUMNS);
        return {
          x: metrics.padding + column * metrics.cellWidth + metrics.inset,
          y: metrics.padding + row * metrics.cellHeight + metrics.inset,
          width: Math.max(100, metrics.cellWidth - metrics.inset * 2),
          height: metrics.cellHeight - metrics.inset * 2,
          gridColumn: column,
          gridRow: row
        };
      };
      const moveNoteToTab = (noteId, targetTabId) => {
        if (!noteId || !targetTabId || !tabs.some(tab => tab.id === targetTabId)) return;
        pushUndoSnapshot();
        setNotes(prevNotes => {
          const targetNoteCount = prevNotes.filter(note => note.tabId === targetTabId && note.id !== noteId).length;
          const cell = getGridCellPosition(targetNoteCount);
          return prevNotes.map(note => note.id === noteId ? { ...note, ...cell, tabId: targetTabId, isEditing: false } : note);
        });
        setActiveTabId(targetTabId);
      };
      const handleNoteDragStart = (ev, noteId) => {
        setDraggedListNoteId(noteId);
        ev.dataTransfer.setData('text/plain', noteId);
        ev.dataTransfer.effectAllowed = 'move';
      };
      const allowNoteDrop = (ev) => {
        const hasNoteData = draggedListNoteId || Array.from(ev.dataTransfer.types || []).includes('text/plain');
        if (!hasNoteData) return;
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
      };
      const handleTabDrop = (ev, targetTabId) => {
        ev.preventDefault();
        ev.stopPropagation();
        const noteId = ev.dataTransfer.getData('text/plain') || draggedListNoteId;
        moveNoteToTab(noteId, targetTabId);
        setDraggedListNoteId(null);
      };
      const allowBoardDrop = (ev) => {
        if (ev.target.closest('[data-all-notes-panel="true"]')) return;
        allowNoteDrop(ev);
      };
      const handleBoardDrop = (ev) => {
        if (ev.target.closest('[data-all-notes-panel="true"]')) return;
        ev.preventDefault();
        ev.stopPropagation();
        const noteId = ev.dataTransfer.getData('text/plain') || draggedListNoteId;
        if (!noteId || !boardRef.current) return;
        const boardRect = boardRef.current.getBoundingClientRect();
        const metrics = getBoardMetrics();
        const dropX = ev.clientX - boardRect.left;
        const dropY = ev.clientY - boardRect.top;
        const column = Math.min(GRID_COLUMNS - 1, Math.max(0, Math.round((dropX - metrics.padding) / metrics.cellWidth)));
        const row = Math.max(0, Math.round((dropY - metrics.padding) / metrics.cellHeight));
        const cell = {
          x: metrics.padding + column * metrics.cellWidth + metrics.inset,
          y: metrics.padding + row * metrics.cellHeight + metrics.inset,
          width: Math.max(100, metrics.cellWidth - metrics.inset * 2),
          height: metrics.cellHeight - metrics.inset * 2,
          gridColumn: column,
          gridRow: row
        };
        pushUndoSnapshot();
        setNotes(prevNotes => prevNotes.map(note => note.id === noteId ? { ...note, ...cell, tabId: activeTabId, isEditing: false } : note));
        setDraggedListNoteId(null);
      };
      const getPrintableTabs = () => {
        const selectedTabs = tabs.filter(tab => selectedTabIds.has(tab.id));
        return selectedTabs.length > 0 ? selectedTabs : tabs.filter(tab => tab.id === activeTabId);
      };

      const getSaveData = () => ({
        notes: notes.map(({ memo, ...note }) => note),
        tabs,
        activeTabId,
        selectedTabIds: [...selectedTabIds],
        highestZIndex,
        pastedText,
        columns,
        rawData,
        selectedTitleCol,
        selectedRowIndices: [...selectedRowIndices],
        updatedBy: clientIdRef.current
      });

      const parseFirebaseConfigText = (text) => {
        const trimmed = String(text || '').trim();
        if (!trimmed) throw new Error('設定ファイルが空です');
        try {
          return JSON.parse(trimmed);
        } catch (jsonError) {
          const objectText = trimmed
            .replace(/^export\s+default\s+/, '')
            .replace(/^(const|let|var)\s+firebaseConfig\s*=\s*/, '')
            .replace(/;$/, '');
          return Function(`"use strict"; return (${objectText});`)();
        }
      };

      const applyFirebaseConfig = (config) => {
        if (!config || !config.apiKey || !config.projectId || !config.appId) {
          window.alert('Firebase設定に apiKey / projectId / appId が含まれているか確認してください。');
          setFirebaseStatus('Firebase設定エラー');
          return;
        }
        localStorage.setItem(FIREBASE_CONFIG_STORAGE_KEY, JSON.stringify(config));
        setFirebaseConfigState(config);
        setFirebaseStatus('Firebase設定を読み込みました');
      };

      const handleFirebaseConfigFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const config = parseFirebaseConfigText(reader.result);
            applyFirebaseConfig(config);
            setShowFirebaseSettings(false);
          } catch (error) {
            console.error('Firebase設定ファイルの読み込みに失敗しました', error);
            window.alert('Firebase設定ファイルを読み込めませんでした。JSON形式、または const firebaseConfig = {...}; 形式のファイルを指定してください。');
            setFirebaseStatus('設定ファイル読込エラー');
          }
        };
        reader.readAsText(file);
      };

      const handleFirebaseConfigDrop = (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        handleFirebaseConfigFile(ev.dataTransfer.files && ev.dataTransfer.files[0]);
      };

      const clearFirebaseConfig = () => {
        localStorage.removeItem(FIREBASE_CONFIG_STORAGE_KEY);
        firebaseDbRef.current = null;
        setFirebaseConfigState(null);
        setFirebaseStatus('Firebase設定待ち');
      };

      const saveBoardData = (statusPrefix = '保存済み') => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(getSaveData()));
          const time = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
          setSaveStatus(`${statusPrefix} ${time}`);
          if (isFirebaseConfigured && firebaseDbRef.current && !remoteUpdateRef.current) {
            firebaseDbRef.current.collection('boards').doc(FIREBASE_BOARD_ID).set({
              ...getSaveData(),
              updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true }).then(() => {
              setFirebaseStatus(`共有済み ${time}`);
            }).catch(error => {
              console.error('Firebaseへの保存に失敗しました', error);
              setFirebaseStatus('Firebase保存エラー');
            });
          }
        } catch (error) {
          console.error('保存に失敗しました', error);
          setSaveStatus('保存に失敗しました');
        }
      };

      const createUndoSnapshot = () => ({
        notes: notes.map(note => ({ ...note })),
        tabs: tabs.map(tab => ({ ...tab })),
        activeTabId,
        selectedTabIds: [...selectedTabIds],
        selectedNoteIds: [...selectedNoteIds],
        highestZIndex
      });

      const pushUndoSnapshot = () => {
        undoHistoryRef.current = [...undoHistoryRef.current.slice(-49), createUndoSnapshot()];
        setCanUndo(true);
      };

      const undoLastAction = () => {
        const snapshot = undoHistoryRef.current.pop();
        if (!snapshot) return;
        setNotes(snapshot.notes);
        setTabs(snapshot.tabs);
        setActiveTabId(snapshot.activeTabId);
        setSelectedTabIds(new Set(snapshot.selectedTabIds));
        setSelectedNoteIds(new Set(snapshot.selectedNoteIds));
        setHighestZIndex(snapshot.highestZIndex);
        setDraggingId(null);
        setResizingId(null);
        setDraggedListNoteId(null);
        setCanUndo(undoHistoryRef.current.length > 0);
        setSaveStatus('一つ戻しました');
      };

      useEffect(() => {
        try {
          const savedText = localStorage.getItem(STORAGE_KEY);
          if (!savedText) {
            setSaveStatus('新規データ');
            return;
          }

          const saved = JSON.parse(savedText);
          setNotes(Array.isArray(saved.notes) ? saved.notes.map(({ memo, ...note }) => note) : []);
          setTabs(Array.isArray(saved.tabs) && saved.tabs.length > 0 ? saved.tabs : [{ id: 'tab-1', name: 'メインボード' }]);
          setActiveTabId(saved.activeTabId || 'tab-1');
          setSelectedTabIds(new Set(Array.isArray(saved.selectedTabIds) && saved.selectedTabIds.length > 0 ? saved.selectedTabIds : ['tab-1']));
          setHighestZIndex(Number.isFinite(saved.highestZIndex) ? saved.highestZIndex : 1);
          setPastedText(saved.pastedText || '');
          setColumns(Array.isArray(saved.columns) ? saved.columns : []);
          setRawData(Array.isArray(saved.rawData) ? saved.rawData : []);
          setSelectedTitleCol(saved.selectedTitleCol || '');
          setSelectedRowIndices(new Set(Array.isArray(saved.selectedRowIndices) ? saved.selectedRowIndices : []));
          setSaveStatus('保存データを読み込みました');
        } catch (error) {
          console.error('保存データの読み込みに失敗しました', error);
          setSaveStatus('保存データの読み込みに失敗しました');
        }
      }, []);

      useEffect(() => {
        if (skipInitialSaveRef.current) {
          skipInitialSaveRef.current = false;
          return;
        }
        if (remoteUpdateRef.current) {
          remoteUpdateRef.current = false;
          return;
        }

        const timer = setTimeout(() => {
          saveBoardData('自動保存済み');
        }, 600);

        return () => clearTimeout(timer);
      }, [notes, tabs, activeTabId, selectedTabIds, highestZIndex, pastedText, columns, rawData, selectedTitleCol, selectedRowIndices]);

      useEffect(() => {
        if (!isFirebaseConfigured) {
          firebaseDbRef.current = null;
          setFirebaseStatus('Firebase設定待ち');
          return;
        }
        if (!window.firebase || !window.firebase.firestore) {
          setFirebaseStatus('Firebase SDK読込エラー');
          return;
        }

        try {
          if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
          const db = window.firebase.firestore();
          firebaseDbRef.current = db;
          const boardDoc = db.collection('boards').doc(FIREBASE_BOARD_ID);
          setFirebaseStatus('Firebase接続中');

          const unsubscribe = boardDoc.onSnapshot(snapshot => {
            if (!snapshot.exists) {
              setFirebaseStatus('共有ボード作成待ち');
              return;
            }

            const shared = snapshot.data() || {};
            if (shared.updatedBy === clientIdRef.current) return;

            remoteUpdateRef.current = true;
            setNotes(Array.isArray(shared.notes) ? shared.notes.map(({ memo, ...note }) => note) : []);
            setTabs(Array.isArray(shared.tabs) && shared.tabs.length > 0 ? shared.tabs : [{ id: 'tab-1', name: 'メインボード' }]);
            setActiveTabId(shared.activeTabId || 'tab-1');
            setSelectedTabIds(new Set(Array.isArray(shared.selectedTabIds) && shared.selectedTabIds.length > 0 ? shared.selectedTabIds : ['tab-1']));
            setHighestZIndex(Number.isFinite(shared.highestZIndex) ? shared.highestZIndex : 1);
            setPastedText(shared.pastedText || '');
            setColumns(Array.isArray(shared.columns) ? shared.columns : []);
            setRawData(Array.isArray(shared.rawData) ? shared.rawData : []);
            setSelectedTitleCol(shared.selectedTitleCol || '');
            setSelectedRowIndices(new Set(Array.isArray(shared.selectedRowIndices) ? shared.selectedRowIndices : []));
            setSaveStatus('共有データを受信しました');
            setFirebaseStatus('共同編集中');
          }, error => {
            console.error('Firebaseの同期に失敗しました', error);
            setFirebaseStatus('Firebase同期エラー');
          });

          return () => unsubscribe();
        } catch (error) {
          console.error('Firebaseの初期化に失敗しました', error);
          setFirebaseStatus('Firebase初期化エラー');
        }
      }, [firebaseConfigState]);

      const handlePaste = (e) => {
        const text = e.target.value;
        setPastedText(text);
        if (!text.trim()) {
          setRawData([]); setColumns([]); setSelectedRowIndices(new Set()); return;
        }
        const rows = text.trim().split('\n').map(row => row.split('\t'));
        if (rows.length > 0) {
          const headers = rows[0].map(h => h.trim());
          const data = rows.slice(1).map(row => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = row[i] ? row[i].trim() : ''; });
            return obj;
          });
          setColumns(headers);
          setRawData(data);
          setSelectedRowIndices(new Set(data.map((_, i) => i)));
          if (headers.length > 0) setSelectedTitleCol(headers[0]);
        }
      };

      const generateNotes = () => {
        if (!selectedTitleCol) return;
        pushUndoSnapshot();
        const metrics = getBoardMetrics();
        const activeNoteCount = notes.filter(note => note.tabId === activeTabId).length;
        const targetRows = rawData.filter((_, i) => selectedRowIndices.has(i));
        const newNotes = targetRows.map((row, i) => {
          const cell = getGridCellPosition(activeNoteCount + i, metrics);
          return {
            id: `note-${Date.now()}-${i}-${Math.random().toString(36).slice(2)}`,
            text: row[selectedTitleCol] || '空のデータ',
            ...cell,
            zIndex: highestZIndex + i + 1,
            color: colors[0], color2: null, isEditing: false, tabId: activeTabId
          };
        });
        setHighestZIndex(prev => prev + newNotes.length);
        setNotes(prev => [...prev, ...newNotes]);
        setSidebarOpen(false);
      };

      const addBlankNote = () => {
        pushUndoSnapshot();
        const newZ = highestZIndex + 1;
        const activeNoteCount = notes.filter(note => note.tabId === activeTabId).length;
        const cell = getGridCellPosition(activeNoteCount);
        setHighestZIndex(newZ);
        setNotes(prev => [...prev, {
          id: `note-${Date.now()}-${Math.random().toString(36).slice(2)}`,
          text: '新しい付箋',
          ...cell,
          zIndex: newZ, color: colors[0], color2: null, isEditing: true, tabId: activeTabId
        }]);
      };

      const handlePointerDown = (e, id) => {
        if (e.detail >= 2) {
          e.preventDefault();
          e.stopPropagation();
          startEditingNote(id, 'text', e);
          return;
        }

        const tagName = e.target.tagName.toLowerCase();
        if (tagName === 'textarea' || tagName === 'input' || tagName === 'button' || e.target.closest('button') || e.target.closest('.resize-handle')) return;
        if (e.type === 'touchstart' && !e.target.closest('.scrollable-area')) e.preventDefault();
        const note = notes.find(n => n.id === id);
        if (!note || !boardRef.current) return;
        pushUndoSnapshot();
        const newZ = highestZIndex + 1;
        setHighestZIndex(newZ);
        setNotes(prevNotes => prevNotes.map(n => n.id === id ? { ...n, zIndex: newZ } : n));
        setDraggingId(id);
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        const boardRect = boardRef.current.getBoundingClientRect();
        setOffset({ x: clientX - boardRect.left - note.x, y: clientY - boardRect.top - note.y });
      };

      const handleResizeDown = (e, id) => {
        e.stopPropagation();
        if (e.type === 'touchstart') e.preventDefault();
        const note = notes.find(n => n.id === id);
        if (!note) return;
        pushUndoSnapshot();
        const newZ = highestZIndex + 1;
        setHighestZIndex(newZ);
        setNotes(prevNotes => prevNotes.map(n => n.id === id ? { ...n, zIndex: newZ } : n));
        setResizingId(id);
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        setResizeStartPos({ x: clientX, y: clientY });
        setResizeStartSize({ width: note.width || 200, height: note.height || 120 });
      };

      const handlePointerMove = useCallback((e) => {
        if (!draggingId && !resizingId) return;
        if (e.type === 'touchmove') e.preventDefault();
        const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
        if (resizingId) {
          const deltaX = clientX - resizeStartPos.x;
          const deltaY = clientY - resizeStartPos.y;
          setNotes(prevNotes => prevNotes.map(note => note.id === resizingId ? {
            ...note, width: Math.max(120, resizeStartSize.width + deltaX), height: Math.max(80, resizeStartSize.height + deltaY)
          } : note));
          return;
        }
        if (draggingId && boardRef.current) {
          const targetEl = document.elementFromPoint(clientX, clientY);
          if (targetEl) {
            const tabEl = targetEl.closest('[data-tab-id]');
            if (tabEl) {
              const hoverTabId = tabEl.getAttribute('data-tab-id');
              if (hoverTabId && hoverTabId !== activeTabId) {
                setActiveTabId(hoverTabId);
                setNotes(prevNotes => prevNotes.map(n => n.id === draggingId ? { ...n, tabId: hoverTabId } : n));
              }
            }
          }
          const boardRect = boardRef.current.getBoundingClientRect();
          setNotes(prevNotes => prevNotes.map(note => note.id === draggingId ? {
            ...note, x: clientX - boardRect.left - offset.x, y: clientY - boardRect.top - offset.y
          } : note));
        }
